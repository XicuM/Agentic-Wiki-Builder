# Project-level policy for protocols workspace

[[rule]]
toolName = "*"
decision = "deny"
priority = 10

[[rule]]
# Allow specific file system, execution, and web tools required by the Auto-Huberman MAS
toolName = [
    "run_shell_command",
    "read_file",
    "read_many_files",
    "replace",
    "glob",
    "grep_search",
    "activate_skill",
    "web_fetch",
    "write_todos",
    "ask_user"
]
decision = "allow"
priority = 20
